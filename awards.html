        @media (min-width: 640px) { .sm\:px-6 { padding-left: 1.5rem; padding-right: 1.5rem; } .sm\:flex-row { flex-direction: row; } .sm\:justify-between { justify-content: space-between; } }

        .dark .nav-scrolled { background: rgba(15, 23, 42, 0.8); border-bottom-color: rgba(71, 85, 105, 0.5); }
        .nav-indicator { position: absolute; border-radius: 0.5rem; background: rgba(212, 165, 98, 0.1); pointer-events: none; transition: left 0.2s ease, width 0.2s ease; }
        .btn-theme { padding: 0.5rem; border: none; background: none; color: var(--neutral-600); cursor: pointer; border-radius: 0.5rem; }
        .btn-theme:hover { color: var(--accent); }
        .nav-mobile-btn { display: flex; align-items: center; justify-content: center; padding: 0.5rem; border: none; background: none; color: var(--neutral-600); cursor: pointer; }
        .nav-mobile-panel { display: none; background: var(--background); border-bottom: 1px solid var(--neutral-200); padding: 0.5rem; }
        .nav-mobile-panel.active { display: block; }
        .nav-mobile-link { display: block; padding: 0.75rem; border-radius: 0.5rem; color: var(--neutral-600); text-decoration: none; font-weight: 500; }
        .nav-mobile-link:hover { color: var(--accent); }
        .nav-mobile-link.active { color: var(--primary); background: rgba(212, 165, 98, 0.1); }
        .nav-desktop-link { position: relative; padding: 0.5rem 0.75rem; border-radius: 0.5rem; color: var(--neutral-600); text-decoration: none; font-size: 0.875rem; font-weight: 500; }
        .nav-desktop-link:hover, .nav-desktop-link.active { color: var(--primary); }
        footer { border-top: 1px solid rgba(226, 232, 240, 0.5); background: rgba(248, 250, 252, 0.5); }
        .dark footer { border-top-color: rgba(71, 85, 105, 0.5); background: rgba(15, 23, 42, 0.5); }
        a { color: var(--accent); text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        .award-card { background: var(--neutral-100); border-radius: 0.75rem; padding: 1.5rem; transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; }
        .award-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .dark .award-card { background: var(--neutral-800); }
        .award-title { font-size: 1.125rem; font-weight: 600; color: var(--primary); }
        .award-org { font-size: 0.875rem; color: var(--neutral-600); margin-top: 0.25rem; }
        .award-date { font-size: 0.875rem; color: var(--neutral-500); }
        .award-desc { font-size: 0.9375rem; color: var(--neutral-600); margin-top: 0.5rem; width: 100%; }
    </style>
</head>
<body>
    <nav class="fixed" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 lg:h-20">
                <a href="index.html" class="text-xl lg:text-2xl font-serif font-semibold text-primary hover:text-accent">Betty Xu</a>
                <div class="hidden lg:flex items-center space-x-1" id="navContainer">
                    <div class="nav-indicator" id="navIndicator"></div>
                    <a href="index.html" class="nav-desktop-link">关于我</a>
                    <a href="cv.html" class="nav-desktop-link">简历</a>
                    <a href="blog.html" class="nav-desktop-link">Blog</a>

                    <a href="awards.html" class="nav-desktop-link active">奖项</a>
                    <button class="btn-theme ml-4" id="themeToggle"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
                </div>
                <div class="lg:hidden flex items-center space-x-2">
                    <button class="btn-theme" id="themeToggleMobile"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
                    <button class="nav-mobile-btn" id="mobileMenuBtn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                </div>
            </div>
        </div>
        <div class="nav-mobile-panel" id="mobileMenuPanel">
            <a href="index.html" class="nav-mobile-link">关于我</a>
            <a href="cv.html" class="nav-mobile-link">简历</a>
            <a href="blog.html" class="nav-mobile-link">Blog</a>
            <a href="projects.html" class="nav-mobile-link">项目</a>
            <a href="publications.html" class="nav-mobile-link">论文</a>
            <a href="awards.html" class="nav-mobile-link active">奖项</a>
        </div>
    </nav>

    <main class="min-h-screen pt-16 lg:pt-20">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <h1 class="text-3xl font-serif font-bold text-primary mb-2">奖项</h1>
            <p class="text-neutral-600 mb-8">我获得的荣誉和奖项。</p>

            <div class="space-y-6">
                <article class="award-card">
                    <div>
                        <h2 class="award-title">优秀研究生奖学金</h2>
                        <p class="award-org">某985大学</p>
                        <p class="award-desc">基于学术表现和研究贡献颁发的奖学金。</p>
                    </div>
                    <p class="award-date">2025</p>
                </article>

                <article class="award-card">
                    <div>
                        <h2 class="award-title">优秀本科毕业生</h2>
                        <p class="award-org">某本科院校</p>
                        <p class="award-desc">毕业时获得优秀毕业生称号。</p>
                    </div>
                    <p class="award-date">2024</p>
                </article>

                <article class="award-card">
                    <div>
                        <h2 class="award-title">全国大学生创新创业大赛二等奖</h2>
                        <p class="award-org">教育部</p>
                        <p class="award-desc">参与创新项目并获得全国二等奖。</p>

                    <p class="award-date">2023</p>

            </div>
        </div>

    <footer>
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-2">
                <p class="text-xs text-neutral-500">最后更新: 2026年6月1日</p>
                <p class="text-xs text-neutral-500"><a href="https://github.com/xyjoey/PRISM" target="_blank">Built with PRISM</a><span class="ml-2">🚀</span></p>
            </div>
        </div>
    </footer>

    <script>
        const navbar = document.getElementById('navbar');
        const navIndicator = document.getElementById('navIndicator');
        const navContainer = document.getElementById('navContainer');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenuPanel = document.getElementById('mobileMenuPanel');
        const themeToggle = document.getElementById('themeToggle');
        const themeToggleMobile = document.getElementById('themeToggleMobile');

        window.addEventListener('scroll', () => navbar.classList.toggle('nav-scrolled', window.scrollY > 20));

        function updateNavIndicator(el) {
            if (!navIndicator || !el) return;
            const rect = el.getBoundingClientRect();
            const containerRect = navContainer.getBoundingClientRect();
            navIndicator.style.left = `${rect.left - containerRect.left}px`;
            navIndicator.style.width = `${rect.width}px`;
        }
        updateNavIndicator(document.querySelector('.nav-desktop-link.active'));

        document.querySelectorAll('.nav-desktop-link').forEach(link => {
            link.addEventListener('mouseenter', () => updateNavIndicator(link));
            link.addEventListener('mouseleave', () => updateNavIndicator(document.querySelector('.nav-desktop-link.active')));
        });

        mobileMenuBtn.addEventListener('click', () => {
            mobileMenuPanel.classList.toggle('active');
            mobileMenuBtn.querySelector('svg').innerHTML = mobileMenuPanel.classList.contains('active')
                ? '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>'
                : '<line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>';
        });

        const toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const sunIcon = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            const moonIcon = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            themeToggle.querySelector('svg').innerHTML = isDark ? moonIcon : sunIcon;
            themeToggleMobile.querySelector('svg').innerHTML = isDark ? moonIcon : sunIcon;
        };
        themeToggle.addEventListener('click', toggleTheme);
        themeToggleMobile.addEventListener('click', toggleTheme);

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            themeToggle.querySelector('svg').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            themeToggleMobile.querySelector('svg').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }
    </script>
</body>
</html>
